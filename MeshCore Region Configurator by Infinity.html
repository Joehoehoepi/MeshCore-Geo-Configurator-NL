<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>MeshCore Geo Configurator by Infinity</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #4af626; font-family: 'Consolas', monospace; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.25; }
        .main-wrapper { display: flex; width: 98vw; height: 94vh; background: rgba(5, 5, 5, 0.9); border: 1px solid #4af626; border-radius: 8px; box-shadow: 0 0 40px rgba(74, 246, 38, 0.2); overflow: hidden; position: relative; }
        #map { flex: 1; height: 100% !important; min-height: 100%; border-right: 1px solid #4af626; z-index: 1; }
        .controls-panel { width: 420px; height: 100%; padding: 20px; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.95); box-sizing: border-box; z-index: 2; }
        h2 { margin: 0 0 15px 0; font-size: 1.1em; text-align: center; color: #4af626; border-bottom: 1px solid #1a5a0f; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .slider-box { margin-bottom: 15px; text-align: center; width: 100%; background: rgba(74, 246, 38, 0.05); padding: 10px; border-radius: 4px; box-sizing: border-box; border: 1px solid #1a5a0f; }
        .label-main { font-size: 0.8em; display: block; margin-bottom: 5px; color: #888; text-transform: uppercase; }
        .slider-val { color: #4af626; font-weight: bold; font-size: 2.8em; display: block; line-height: 1; text-shadow: 0 0 10px rgba(74, 246, 38, 0.6); }
        input[type=range] { width: 100%; margin: 10px 0; accent-color: #4af626; cursor: pointer; }
        .output-container { flex: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 10px; }
        .cli-label { font-size: 0.9em; text-align: center; display: block; margin-bottom: 8px; color: #4af626; text-transform: uppercase; letter-spacing: 1px; }
        .output { background: #000; color: #4af626; padding: 15px; border: 1px solid #1a5a0f; font-size: 11px; overflow-y: auto; flex: 1; white-space: pre-wrap; line-height: 1.4; box-shadow: inset 0 0 15px rgba(0,0,0,1); }
        button { padding: 15px; background: transparent; border: 1px solid #4af626; color: #4af626; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; text-transform: uppercase; flex-shrink: 0; }
        button:hover { background: #4af626; color: #000; }
        .leaflet-control-layers { background: #000 !important; color: #4af626 !important; border: 1px solid #4af626 !important; font-family: inherit; }
    </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="main-wrapper">
    <div id="map"></div>
    <div class="controls-panel">
        <h2>MeshCore Region Configurator by Infinity</h2>
        <div class="slider-box">
            <span class="label-main">Geselecteerde Straal</span>
            <span id="val" class="slider-val">10</span>
            <input id="range" type="range" min="5" max="40" value="10">
            <span style="font-size: 0.7em; color: #555; letter-spacing: 2px;">KILOMETER BEREIK</span>
        </div>
        <div class="output-container">
            <span class="cli-label">CLI GENERATOR OUTPUT</span>
            <div id="code-output" class="output">Klik op de kaart om de regio's te berekenen...</div>
        </div>
        <button onclick="_0xaf29()">⚡ COPY CONFIGURATION</button>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="./nl-locode-db.js"></script>
<script>
(function(){
    const _0x1=document,_0x2=_0x1.getElementById('val'),_0x3=_0x1.getElementById('range'),_0x4=_0x1.getElementById('code-output');
    // Provinciecodes uit UN/LOCODE -> MeshCore regiocodes
    const _0xP={"DR":"nl-dr","FL":"nl-fl","FR":"nl-fr","GE":"nl-ge","GR":"nl-gr","LI":"nl-li","NB":"nl-nb","NH":"nl-nh","OV":"nl-ov","UT":"nl-ut","ZE":"nl-ze","ZH":"nl-zh"};

    // Offline UN/LOCODE NL database (zie nl-locode-db.js)
    const _0xDB=(window.__NL_LOCODE_DB||[]).map(([n,c,p,lat,lon])=>({n,c,p,lat,lon}));
    if(_0xDB.length===0){
        _0x4.innerText="Offline UN/LOCODE database ontbreekt (nl-locode-db.js).";
    }

    let _0xM,_0xC,_0xL;
    const _0xOSM=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
          _0xSAT=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
          _0xHYB=L.layerGroup([_0xSAT,L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')]);

    const map=L.map("map",{center:[52.34,5.86],zoom:10,layers:[_0xOSM]});
    L.control.layers({"Standaard":_0xOSM,"Satelliet":_0xSAT,"Hybride":_0xHYB}).addTo(map);

    function _0xUpd(la,lo){
        _0x2.innerText=_0x3.value;
        if(_0xM)map.removeLayer(_0xM);if(_0xC)map.removeLayer(_0xC);
        _0xM=L.marker([la,lo]).addTo(map);
        const r=(_0x3.value/2)*1000;
        _0xC=L.circle([la,lo],{radius:r,color:"#4af626",weight:2,fillOpacity:0.15}).addTo(map);
        
        let sP=new Set(),sR=[];
        _0xDB.forEach(g=>{
            if(map.distance([la,lo],[g.lat,g.lon])<=r){
                const prov=_0xP[g.p];
                if(!prov) return;
                sP.add(prov);
                sR.push(prov+"-"+g.c);
            }
        });

        let res=["region put nl"];
        sP.forEach(p=>res.push(`region put ${p} nl`));
        sR.forEach(r=>res.push(`region put ${r} ${r.split('-')[1]}`));
        res.push("region allowf nl");
        sP.forEach(p=>res.push(`region allowf ${p}`));
        sR.forEach(r=>res.push(`region allowf ${r}`));
        if(sR.length>0)res.push(`region home ${sR[0]}`);
        res.push("region save");
        _0x4.innerText=res.join("\n");
    }

    map.on("click",e=>{_0xUpd(e.latlng.lat,e.latlng.lng);_0xL=e.latlng;});
    _0x3.oninput=()=>{if(_0xL)_0xUpd(_0xL.lat,_0xL.lng);else _0x2.innerText=_0x3.value;};
    
    // Resize fix voor Leaflet
    setTimeout(() => { map.invalidateSize(); }, 200);
})();

function _0xaf29(){
    const c=document.getElementById('code-output').innerText;
    navigator.clipboard.writeText(c).then(()=>{
        const b=document.querySelector('button');b.innerText="COPIED!";
        setTimeout(()=>b.innerText="⚡ COPY CONFIGURATION",1000);
    });
}

const can=document.getElementById('bg-canvas'),ctx=can.getContext('2d');
can.width=window.innerWidth;can.height=window.innerHeight;const dr=Array(Math.floor(can.width/15)).fill(1);
function draw(){ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(0,0,can.width,can.height);ctx.fillStyle="#0F0";ctx.font="15px monospace";dr.forEach((y,i)=>{ctx.fillText(Math.floor(Math.random()*2),i*15,y*15);if(y*15>can.height&&Math.random()>0.975)dr[i]=0;dr[i]++;});}setInterval(draw,50);
</script>
</body>
</html>
