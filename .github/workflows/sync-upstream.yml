name: Auto Sync Mesh-Up Data
on:
  schedule:
    - cron: '0 0 * * 1'  # Elke maandagnacht om 00:00 uur
  workflow_dispatch:      # Hiermee kun je ook handmatig op "Start" drukken

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mijn code
        uses: actions/checkout@v3

      - name: Haal de nieuwste data van de bron
        run: |
          # Hier downloaden we het nieuwe bestand van de bron-website
          curl -L "https://link-naar-bron-mesh-up/data.json" -o data/municipalities.json

      - name: Controleer en Commit
        run: |
          git config --global user.name 'Meshfinity-Bot'
          git config --global user.email 'bot@meshfinity.nl'
          git add data/municipalities.json
          # Alleen committen als er echt iets veranderd is
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatische update: Mesh-up Database ververst" && git push)
