name: Auto Sync Mesh-Up Cities

# We zetten de krachtige 'force' knop op het hoogste niveau
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-cities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jouw Meshfinity code
        uses: actions/checkout@v4
        with:
          # Soms helpt het om expliciet de laatste commit te pakken
          persist-credentials: false 

      - name: Haal de nieuwste cities.js op
        run: |
          mkdir -p src
          curl -L "https://www.mesh-up.nl/mc-rp-autoconfig/src/cities.js" -o src/cities.js

      - name: Controleer op wijzigingen
        run: |
          git config --global user.name 'Meshfinity-Bot'
          git config --global user.email 'bot@meshfinity.nl'
          git add src/cities.js
          
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden."
          else
            git commit -m "Automatische update: cities.js via Node 24 Runner"
            git push
          fi
