name: Auto Sync Mesh-Up Cities
on:
  schedule:
    - cron: '0 0 * * 1'  # Elke maandagnacht om 00:00 uur
  workflow_dispatch:      # Handmatige knop om te testen

# Dit is de fix voor de Node.js 24 waarschuwing:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-cities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jouw Meshfinity code
        uses: actions/checkout@v4  # v4 is goed, we dwingen nu alleen Node 24 af via de env hierboven

      - name: Haal de nieuwste cities.js op van Mesh-up
        run: |
          mkdir -p src
          curl -L "https://www.mesh-up.nl/mc-rp-autoconfig/src/cities.js" -o src/cities.js

      - name: Controleer op wijzigingen en verwerk deze
        run: |
          git config --global user.name 'Meshfinity-Bot'
          git config --global user.email 'bot@meshfinity.nl'
          git add src/cities.js
          
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden in de stedenlijst."
          else
            git commit -m "Automatische update: cities.js gesynchroniseerd (Node 24)"
            git push
          fi
