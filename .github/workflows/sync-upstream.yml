name: Auto Sync Mesh-Up Cities

# Forceer Node 24 op globaal niveau
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update-cities:
    runs-on: ubuntu-latest
    # We herhalen de force-knop hier nogmaals voor de zekerheid
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout jouw Meshfinity code
        uses: actions/checkout@v4
        with:
          # We zorgen dat de robot de juiste rechten behoudt
          persist-credentials: true

      - name: Haal de nieuwste cities.js op
        run: |
          mkdir -p src
          curl -L "https://www.mesh-up.nl/mc-rp-autoconfig/src/cities.js" -o src/cities.js

      - name: Controleer op wijzigingen
        run: |
          git config --global user.name 'Meshfinity-Bot'
          git config --global user.email 'bot@meshfinity.nl'
          git add src/cities.js
          
          # Alleen pushen als er echt iets nieuws is
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden. Database is al actueel."
          else
            git commit -m "Automatische update: cities.js (Sync via Node 24)"
            git push
          fi
