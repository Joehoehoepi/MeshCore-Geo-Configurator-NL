name: Auto Sync Mesh-Up Cities
on:
  schedule:
    - cron: '0 0 * * 1'  # Elke maandagnacht om 00:00 uur
  workflow_dispatch:      # Zodat je zelf op de knop kunt drukken

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # We gaan direct over op de nieuwe standaard

jobs:
  update-cities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout jouw Meshfinity code
        uses: actions/checkout@v4  # Geüpdatet naar v4 voor Node.js 24 support

      - name: Haal de nieuwste cities.js op van Mesh-up
        run: |
          # Zorg dat de map bestaat
          mkdir -p src
          # Download het bestand
          curl -L "https://www.mesh-up.nl/mc-rp-autoconfig/src/cities.js" -o src/cities.js

      - name: Controleer op wijzigingen en verwerk deze
        run: |
          git config --global user.name 'Meshfinity-Bot'
          git config --global user.email 'bot@meshfinity.nl'
          git add src/cities.js
          
          # Check of er echt iets veranderd is
          if git diff --staged --quiet; then
            echo "Geen wijzigingen gevonden."
          else
            git commit -m "Automatische update: cities.js gesynchroniseerd met Node 24 runner"
            git push
          fi
